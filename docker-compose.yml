services:
  # --------------------------------------------------------------------- #
  # Data + messaging infrastructure
  # --------------------------------------------------------------------- #
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deployhub
      POSTGRES_PASSWORD: deployhub
      POSTGRES_DB: deployhub
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.3
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # --------------------------------------------------------------------- #
  # Application
  # --------------------------------------------------------------------- #
  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://deployhub:deployhub@postgres:5432/deployhub
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32chars-minimum}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEED_ON_STARTUP: "true"
      CORS_ORIGINS: "*"
    volumes:
      - chroma-local:/app/chroma_data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}

volumes:
  pg-data:
  chroma-data:
  chroma-local:
